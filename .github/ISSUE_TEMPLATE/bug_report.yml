name: Bug Report
description: Report a bug in SuperGhost
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a config file with:
           ```yaml
           tests:
             - name: "example"
               url: "https://example.com"
               steps:
                 - "Click the login button"
           ```
        2. Run `superghost run config.yaml`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: YAML Configuration
      description: Paste your SuperGhost YAML config (remove any secrets).
      render: yaml
    validations:
      required: false

  - type: input
    id: superghost-version
    attributes:
      label: SuperGhost Version
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: bun-version
    attributes:
      label: Bun Version
      placeholder: "1.3.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2, Ubuntu 24.04, etc."
    validations:
      required: true
