baseUrl: ${TEST_BASE_URL}
cacheDir: e2e/.superghost-cache

context: |
  This is a Task Manager REST API. All endpoints are under /api/*.
  Responses are JSON. Task fields: id, title, description, status (todo/in_progress/done), priority (low/medium/high), created_at, updated_at.
  Seed data includes 3 tasks. Login credentials: username "demo", password "password".

tests:
  - name: Health check
    type: api
    case: GET /api/health returns status 200 with a JSON body containing status "ok"

  - name: List tasks returns array
    type: api
    case: GET /api/tasks returns status 200 with a JSON array containing at least 3 tasks. Each task should have id, title, and status fields.

  - name: Create task via POST
    type: api
    case: |
      POST /api/tasks with JSON body {"title": "Test task", "description": "Created by API test", "priority": "low"}.
      Verify response status is 201 and the returned task has the title "Test task" and priority "low".

  - name: Get single task
    type: api
    case: GET /api/tasks/1 returns status 200 with a JSON object that has id 1 and a title field.

  - name: Update task via PUT
    type: api
    case: |
      PUT /api/tasks/1 with JSON body {"title": "Updated project setup"}.
      Verify response status is 200 and the returned task has the title "Updated project setup".

  - name: Delete task
    type: api
    case: |
      First POST /api/tasks with {"title": "To be deleted"} to create a new task. Note the returned id.
      Then DELETE /api/tasks/{id} using that id. Verify the response contains "deleted": true.
      Then GET /api/tasks/{id} and verify it returns status 404.

  - name: Filter tasks by status
    type: api
    case: GET /api/tasks?status=todo returns status 200 with a JSON array where every task has status "todo".
